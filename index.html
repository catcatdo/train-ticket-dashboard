<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe3ec;
      --card:#ffffff;
      --primary:#1d4ed8;

      --dep-andong:#fff4e8;
      --dep-andong-accent:#f97316;
      --dep-seoul:#eaf6ff;
      --dep-seoul-accent:#0ea5e9;
      --dep-gimcheon:#fffbe6;
      --dep-gimcheon-accent:#eab308;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:980px;margin:0 auto;padding:14px}
    .top{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:10px;
      box-shadow:0 6px 20px rgba(15,23,42,.05);
    }
    h1{margin:0;font-size:22px;line-height:1.2}
    .sub{margin-top:4px;font-size:13px;color:var(--muted)}

    .toolbar{display:flex;justify-content:flex-end;margin-bottom:8px}
    button{
      border:0;
      background:var(--primary);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .table-wrap{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      overflow:auto;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }

    table{
      width:100%;
      min-width:820px;
      border-collapse:separate;
      border-spacing:0;
      font-size:14px;
    }

    thead th{
      position:sticky; top:0;
      z-index:1;
      background:#f8fbff;
      color:#334155;
      text-align:center;
      font-weight:800;
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      white-space:nowrap;
    }

    tbody td{
      border-bottom:1px solid #edf2f7;
      padding:10px 8px;
      text-align:center;
      white-space:nowrap;
      vertical-align:middle;
    }

    tbody tr:last-child td{border-bottom:none}

    tbody tr.dep-andong{background:var(--dep-andong)}
    tbody tr.dep-seoul{background:var(--dep-seoul)}
    tbody tr.dep-gimcheon{background:var(--dep-gimcheon)}

    tbody tr.dep-andong td:first-child{border-left:4px solid var(--dep-andong-accent)}
    tbody tr.dep-seoul td:first-child{border-left:4px solid var(--dep-seoul-accent)}
    tbody tr.dep-gimcheon td:first-child{border-left:4px solid var(--dep-gimcheon-accent)}

    .badge{
      display:inline-block;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:800;
      color:#fff;
    }
    .badge.up{background:#16a34a}
    .badge.down{background:#2563eb}

    .memo{
      max-width:220px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:#475569;
      margin:0 auto;
    }

    .empty{
      padding:20px 12px;
      text-align:center;
      color:#64748b;
    }

    .legend{
      display:flex;gap:8px;flex-wrap:wrap;
      margin:8px 0 0;
      color:#475569;font-size:12px;font-weight:700;
    }
    .dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:-1px}
    .dot.andong{background:var(--dep-andong-accent)}
    .dot.seoul{background:var(--dep-seoul-accent)}
    .dot.gimcheon{background:var(--dep-gimcheon-accent)}

    @media (max-width:760px){
      .wrap{padding:10px}
      h1{font-size:20px}
      button{width:100%}
      .toolbar{display:block}
      .table-wrap{border-radius:12px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>열차표 대시보드</h1>
      <div class="sub">Google Sheet 자동 연동 · 표 보기 모드</div>
      <div class="legend">
        <span><i class="dot andong"></i>안동 출발</span>
        <span><i class="dot seoul"></i>서울 출발</span>
        <span><i class="dot gimcheon"></i>김천구미 출발</span>
      </div>
    </div>

    <div class="toolbar">
      <button id="refresh">새로고침</button>
    </div>

    <div class="table-wrap" id="tableWrap"></div>
  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];

function parseCSV(text){
  const lines=[]; let cur=''; let row=[]; let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){
      row.push(cur); cur='';
    }else if((c==='\n' || c==='\r') && !q){
      if(c==='\r' && n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length || row.length){row.push(cur); lines.push(row);}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return isNaN(d) ? null : d;
}

function dateWithWeekday(s){
  const d = toDate(s);
  if(!d) return s || '-';
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${s} (${wd})`;
}

function getDir(from,to){
  return (from.includes('김천구미') || from.includes('안동') || to.includes('서울')) ? '상행' : '하행';
}

function getDepClass(from){
  if(from.includes('안동')) return 'dep-andong';
  if(from.includes('서울')) return 'dep-seoul';
  if(from.includes('김천구미')) return 'dep-gimcheon';
  return '';
}

function render(rows){
  const el = document.getElementById('tableWrap');

  if(!rows.length){
    el.innerHTML = '<div class="empty">표시할 열차표가 없어.</div>';
    return;
  }

  const trs = rows.map(r=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const dir = getDir(from,to);
    const depClass = getDepClass(from);

    return `
      <tr class="${depClass}">
        <td>${dateWithWeekday(r['날짜'])}</td>
        <td><span class="badge ${dir==='상행'?'up':'down'}">${dir}</span></td>
        <td>${from||'-'}</td>
        <td>${to||'-'}</td>
        <td>${r['출발시간']||'-'}</td>
        <td>${r['도착시간']||'-'}</td>
        <td>${r['열차번호']||'-'}</td>
        <td>${r['좌석']||'-'}</td>
        <td><div class="memo" title="${(r['메모']||'').replace(/"/g,'&quot;')}">${r['메모']||'-'}</div></td>
      </tr>
    `;
  }).join('');

  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>구분</th>
          <th>출발역</th>
          <th>도착역</th>
          <th>출발</th>
          <th>도착</th>
          <th>열차번호</th>
          <th>좌석</th>
          <th>메모</th>
        </tr>
      </thead>
      <tbody>${trs}</tbody>
    </table>
  `;
}

function applyFilter(){
  const out = all.slice().sort((a,b)=>{
    const ak = `${a['날짜']||''} ${a['출발시간']||''}`;
    const bk = `${b['날짜']||''} ${b['출발시간']||''}`;
    return ak.localeCompare(bk);
  });
  render(out);
}

async function load(){
  const res = await fetch(SHEET_CSV+'#'+Date.now());
  const txt = await res.text();
  const lines = parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header = lines[0] || [];
  const sourceRows = lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));

  all = sourceRows.filter(r =>
    (r['날짜']||'').trim() || (r['출발역']||'').trim() || (r['도착역']||'').trim() || (r['좌석']||'').trim()
  );

  applyFilter();
}

document.getElementById('refresh').addEventListener('click', load);
load();
setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
