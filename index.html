<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:980px;margin:0 auto;padding:20px}
    h1{margin:0 0 8px;font-size:28px}.sub{color:#94a3b8;margin-bottom:16px}
    .card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:12px}
    .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .k{font-size:12px;color:#9ca3af}.v{font-size:18px;font-weight:700;line-height:1.3}
    .tools{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:center}
    input,select{background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:10px;width:100%;min-width:0}
    button{background:#2563eb;border:none;color:white;border-radius:10px;padding:10px 12px;cursor:pointer;white-space:nowrap}
    .ticket-list{display:grid;gap:12px}
    .ticket{
      border-radius:18px;
      padding:20px;
      min-height:230px;
      background:linear-gradient(145deg,#1e3a8a 0%,#1d4ed8 35%,#0f172a 100%);
      border:1px solid rgba(147,197,253,.3);
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }
    .ticket.up{background:linear-gradient(145deg,#059669 0%,#10b981 35%,#064e3b 100%);border-color:rgba(110,231,183,.45)}
    .ticket.down{background:linear-gradient(145deg,#0284c7 0%,#38bdf8 35%,#0c4a6e 100%);border-color:rgba(125,211,252,.45)}
    .ticket.kg{background:linear-gradient(145deg,#ca8a04 0%,#eab308 40%,#713f12 100%);border-color:rgba(253,224,71,.55)}
    .ticket-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .ticket-date{font-size:16px;color:#dbeafe;font-weight:700}
    .ticket-seat{font-size:15px;background:rgba(255,255,255,.14);padding:6px 10px;border-radius:999px}
    .route{display:flex;align-items:center;gap:12px;margin:10px 0 14px}
    .station{font-size:28px;font-weight:900;letter-spacing:.2px}
    .arrow{opacity:.95;font-size:22px}
    .times{display:flex;justify-content:space-between;gap:12px;font-size:16px;color:#dbeafe}
    .time-strong{display:block;font-size:24px;font-weight:800;color:#fff}
    .memo{margin-top:10px;font-size:15px;color:#e2e8f0}
    a{color:#93c5fd}

    @media (max-width: 760px){
      .wrap{padding:12px}
      h1{font-size:22px}
      .row{grid-template-columns:repeat(2,minmax(0,1fr))}
      .v{font-size:16px}
      .tools{grid-template-columns:1fr 1fr;position:sticky;top:0;z-index:5;background:#111827;border-radius:12px;padding:10px}
      #q{grid-column:1 / -1}
      #refresh{grid-column:1 / -1}
      .ticket{padding:18px;min-height:220px}
      .ticket-date{font-size:15px}
      .ticket-seat{font-size:14px}
      .station{font-size:24px}
      .arrow{font-size:20px}
      .times{font-size:15px}
      .time-strong{font-size:22px}
      .memo{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>열차표 대시보드</h1>
    <div class="sub">Google Sheet 자동 연동 · 모바일 대응</div>

    <div class="card tools" style="grid-template-columns:1fr">
      <button id="refresh">새로고침</button>
    </div>

    <div id="rows" class="ticket-list"></div>


  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];

function parseCSV(text){
  const lines=[];let cur='';let row=[];let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur); cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r'&&n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length||row.length){row.push(cur); lines.push(row)}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return isNaN(d)?null:d;
}

function render(rows){
  const tb=document.getElementById('rows'); tb.innerHTML='';
  rows.forEach(r=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const isUp = from.includes('김천구미') || from.includes('안동') || to.includes('서울');
    const dirClass = isUp ? 'up' : 'down';
    const isKg = from.includes('김천구미') || to.includes('김천구미');

    const card=document.createElement('article');
    card.className=`ticket ${dirClass}${isKg ? ' kg' : ''}`;
    card.innerHTML = `
      <div class="ticket-top">
        <div class="ticket-date">${r['날짜']||'-'}</div>
        <div class="ticket-seat">${r['좌석']||'좌석 미정'}</div>
      </div>
      <div class="route">
        <div class="station">${from||'-'}</div>
        <div class="arrow">→</div>
        <div class="station">${to||'-'}</div>
      </div>
      <div class="times">
        <div>${isUp ? '상행' : '하행'} · 출발 <span class="time-strong">${r['출발시간']||'-'}</span></div>
        <div>도착 <span class="time-strong">${r['도착시간']||'-'}</span></div>
      </div>
      ${(r['메모']||'').trim() ? `<div class="memo">메모 · ${r['메모']}</div>` : ''}
    `;
    tb.appendChild(card);
  });

}

function applyFilter(){
  const out=all
    .slice()
    .sort((a,b)=> (a['날짜']||'').localeCompare(b['날짜']||''));
  render(out);
}

async function load(){
  const res=await fetch(SHEET_CSV+'#'+Date.now());
  const txt=await res.text();
  const lines=parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header=lines[0]||[];
  all=lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));
  applyFilter();
}

document.getElementById('refresh').addEventListener('click',load);
load();
setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
