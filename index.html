<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#f8fafc;color:#0f172a}
    .wrap{max-width:980px;margin:0 auto;padding:20px}
    h1{margin:0 0 8px;font-size:28px}.sub{color:#64748b;margin-bottom:16px}
    .card{background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:12px}
    .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .k{font-size:12px;color:#9ca3af}.v{font-size:18px;font-weight:700;line-height:1.3}
    .tools{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:center}
    input,select{background:#ffffff;color:#0f172a;border:1px solid #cbd5e1;border-radius:10px;padding:10px;width:100%;min-width:0}
    button{background:#2563eb;border:none;color:white;border-radius:10px;padding:10px 12px;cursor:pointer;white-space:nowrap}
    .led-wrap{
      background:#0b1220;
      border:2px solid #334155;
      border-radius:12px;
      padding:10px 0;
      margin-bottom:12px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(148,163,184,.2);
    }
    .led-track{
      white-space:nowrap;
      display:inline-block;
      padding-left:0;
      color:#facc15;
      font-weight:800;
      font-size:16px;
      letter-spacing:.4px;
      animation:ledScroll 28s linear infinite;
      text-shadow:0 0 6px rgba(250,204,21,.5);
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      will-change: transform;
    }
    @keyframes ledScroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }
    .ticket-list{display:grid;gap:12px}
    .ticket{
      border-radius:18px;
      padding:22px;
      min-height:250px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:10px;
      background:linear-gradient(to bottom,#f1f5f9 0%, #f1f5f9 32%, #ffffff 33%, #ffffff 100%);
      border:2px solid #94a3b8;
      box-shadow:0 8px 20px rgba(15,23,42,.08);
    }
    .ticket.up{background:linear-gradient(to bottom,#d1fae5 0%,#d1fae5 32%,#ffffff 33%,#ffffff 100%);border-color:#10b981}
    .ticket.down{background:linear-gradient(to bottom,#dbeafe 0%,#dbeafe 32%,#ffffff 33%,#ffffff 100%);border-color:#0ea5e9}
    .ticket.kg{background:linear-gradient(to bottom,#fef3c7 0%,#fef3c7 32%,#ffffff 33%,#ffffff 100%);border-color:#eab308}
    .ticket-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .ticket-date{font-size:18px;color:#0f172a;font-weight:800}
    .ticket-seat{font-size:16px;background:#eef2ff;color:#1e3a8a;padding:7px 12px;border-radius:999px;font-weight:700;border:1px solid #94a3b8}
    .ticket-table{border:1.5px solid #94a3b8;border-radius:12px;overflow:hidden;background:#fff}
    .trow{display:grid;grid-template-columns:110px 1fr;border-bottom:1px solid #cbd5e1}
    .trow:last-child{border-bottom:none}
    .th{background:#f8fafc;color:#1e40af;font-size:15px;font-weight:800;padding:10px 12px;border-right:1px solid #cbd5e1}
    .td{font-size:17px;font-weight:700;color:#0f172a;padding:10px 12px}
    .route-line{font-size:28px;font-weight:900;letter-spacing:.1px;line-height:1.1}
    .time-inline{display:flex;gap:18px;flex-wrap:wrap}
    .time-inline b{font-size:24px}
    .memo{font-size:15px;color:#475569;line-height:1.35}
    a{color:#2563eb}

    @media (max-width: 760px){
      .wrap{padding:12px}
      h1{font-size:22px}
      .row{grid-template-columns:repeat(2,minmax(0,1fr))}
      .v{font-size:16px}
      .tools{grid-template-columns:1fr 1fr;position:sticky;top:0;z-index:5;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:10px}
      #q{grid-column:1 / -1}
      #refresh{grid-column:1 / -1}
      .ticket{padding:18px;min-height:230px}
      .ticket-date{font-size:16px}
      .ticket-seat{font-size:14px}
      .trow{grid-template-columns:90px 1fr}
      .th{font-size:13px;padding:9px 10px}
      .td{font-size:15px;padding:9px 10px}
      .route-line{font-size:22px}
      .time-inline b{font-size:20px}
      .memo{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>열차표 대시보드</h1>
    <div class="sub">Google Sheet 자동 연동 · 모바일 대응</div>

    <div class="led-wrap" aria-label="운행 전광판">
      <div class="led-track" id="ledTrack">LOADING...</div>
    </div>

    <div class="card tools" style="grid-template-columns:1fr">
      <button id="refresh">새로고침</button>
    </div>

    <div id="rows" class="ticket-list"></div>



  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];
let ledMessage='';

function parseCSV(text){
  const lines=[];let cur='';let row=[];let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur); cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r'&&n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length||row.length){row.push(cur); lines.push(row)}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return isNaN(d)?null:d;
}

function dateWithWeekday(s){
  const d = toDate(s);
  if(!d) return s || '-';
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${s} (${wd})`;
}

function render(rows){
  const tb=document.getElementById('rows'); tb.innerHTML='';
  const led=document.getElementById('ledTrack');
  const base = ledMessage.trim() ? `🐱 ${ledMessage.trim()}   ◆   ` : '🐱 환영합니다 · 열차표 대시보드   ◆   ';
  led.textContent = `${base}${base}${base}${base}`;

  rows.forEach(r=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const isUp = from.includes('김천구미') || from.includes('안동') || to.includes('서울');
    const dirClass = isUp ? 'up' : 'down';
    const isKg = from.includes('김천구미') || to.includes('김천구미');

    const card=document.createElement('article');
    card.className=`ticket ${dirClass}${isKg ? ' kg' : ''}`;
    card.innerHTML = `
      <div class="ticket-top">
        <div class="ticket-date">${dateWithWeekday(r['날짜'])}</div>
        <div class="ticket-seat">${r['좌석']||'좌석 미정'}</div>
      </div>
      <div class="ticket-table">
        <div class="trow">
          <div class="th">구분</div>
          <div class="td">${isUp ? '상행' : '하행'}</div>
        </div>
        <div class="trow">
          <div class="th">노선</div>
          <div class="td route-line">${from||'-'} → ${to||'-'}</div>
        </div>
        <div class="trow">
          <div class="th">시간</div>
          <div class="td time-inline">출발 <b>${r['출발시간']||'-'}</b> · 도착 <b>${r['도착시간']||'-'}</b></div>
        </div>
        <div class="trow">
          <div class="th">메모</div>
          <div class="td memo">${(r['메모']||'').trim() || '-'}</div>
        </div>
      </div>
    `;
    tb.appendChild(card);
  });

}

function applyFilter(){
  const out=all
    .slice()
    .sort((a,b)=> (a['날짜']||'').localeCompare(b['날짜']||''));
  render(out);
}

async function load(){
  const res=await fetch(SHEET_CSV+'#'+Date.now());
  const txt=await res.text();
  const lines=parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header=lines[0]||[];
  const sourceRows=lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));
  ledMessage=((sourceRows.find(r => (r['LED문구']||'').trim()) || {})['LED문구'] || '').trim();
  all=sourceRows.filter(r => (r['날짜']||'').trim() || (r['출발역']||'').trim() || (r['도착역']||'').trim() || (r['좌석']||'').trim());
  applyFilter();
}

document.getElementById('refresh').addEventListener('click',load);
load();
setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
