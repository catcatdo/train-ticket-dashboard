<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe3ec;
      --card:#ffffff;
      --primary:#1d4ed8;

      --andong-bg:#fff4e8;
      --andong-accent:#f97316;
      --seoul-bg:#eaf6ff;
      --seoul-accent:#0ea5e9;
      --gimcheon-bg:#fffbe6;
      --gimcheon-accent:#eab308;
    }

    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:70px}
    .wrap{max-width:820px;margin:0 auto;padding:12px}

    .top{
      background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;
      box-shadow:0 6px 20px rgba(15,23,42,.05)
    }
    h1{margin:0;font-size:24px;line-height:1.2}
    .sub{margin-top:4px;color:var(--muted);font-size:13px}

    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:#475569;font-weight:700}
    .dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:5px;vertical-align:-1px}
    .dot.andong{background:var(--andong-accent)}
    .dot.seoul{background:var(--seoul-accent)}
    .dot.gimcheon{background:var(--gimcheon-accent)}

    .toolbar{margin-bottom:10px}
    button{width:100%;border:0;background:var(--primary);color:#fff;border-radius:10px;padding:12px 14px;font-size:15px;font-weight:800;cursor:pointer}

    .ticket-list{display:grid;gap:10px}

    .ticket{
      background:var(--card);
      border:1px solid var(--line);
      border-left:6px solid #cbd5e1;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }
    .ticket.dep-andong{background:var(--andong-bg);border-left-color:var(--andong-accent)}
    .ticket.dep-seoul{background:var(--seoul-bg);border-left-color:var(--seoul-accent)}
    .ticket.dep-gimcheon{background:var(--gimcheon-bg);border-left-color:var(--gimcheon-accent)}

    .ticket-head{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 12px;border-bottom:1px dashed rgba(100,116,139,.35);
      font-size:14px;font-weight:800
    }
    .dir-badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900;color:#fff}
    .dir-badge.up{background:#16a34a}
    .dir-badge.down{background:#2563eb}

    .ticket-body{padding:12px}
    .route{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px}
    .station{font-size:30px;font-weight:900;line-height:1.1;word-break:keep-all}
    .station.right{text-align:right}
    .arrow{font-size:22px;color:#64748b}

    .times{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .time-box{background:#fff;border:1px solid #dbe3ec;border-radius:12px;padding:9px 10px}
    .time-label{font-size:12px;color:var(--muted);font-weight:700}
    .time-strong{font-size:34px;font-weight:900;line-height:1.1;margin-top:2px}

    .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .meta-box{background:#fff;border:1px solid #dbe3ec;border-radius:12px;padding:9px 10px;text-align:center}
    .meta-label{font-size:12px;color:var(--muted);font-weight:700}
    .meta-value{font-size:22px;font-weight:900;line-height:1.15;margin-top:2px}

    .memo-wrap{margin-top:8px}
    .memo-toggle{
      display:block;
      width:100%;
      text-align:left;
      border:1px dashed #cbd5e1;
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      font-size:14px;
      color:#475569;
      cursor:pointer;
    }
    .memo-full{display:none;margin-top:6px;background:#fff;border:1px dashed #cbd5e1;border-radius:10px;padding:8px 10px;font-size:14px;color:#334155;line-height:1.35}
    .memo-wrap.open .memo-full{display:block}

    .empty{background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:18px 12px;text-align:center;color:#64748b}

    .summary-bar{
      position:fixed;
      left:0;right:0;bottom:0;
      z-index:20;
      background:rgba(15,23,42,.95);
      color:#e2e8f0;
      border-top:1px solid rgba(148,163,184,.35);
      padding:10px 14px;
      font-size:13px;
      font-weight:700;
      display:flex;
      justify-content:space-between;
      gap:10px;
      backdrop-filter:saturate(160%) blur(4px);
    }

    @media (max-width:760px){
      .time-strong{font-size:42px}
      .station{font-size:26px}
      .meta-value{font-size:20px}
    }

    @media (min-width:761px){
      body{padding-bottom:0}
      .wrap{padding:20px}
      .toolbar{display:flex;justify-content:flex-end}
      button{width:auto;padding:10px 14px}
      .summary-bar{position:sticky;bottom:8px;max-width:820px;margin:8px auto 0;border-radius:12px}
      .time-strong{font-size:30px}
      .station{font-size:34px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>열차표 대시보드</h1>
      <div class="sub">Google Sheet 자동 연동 · 기차표 스타일</div>
      <div class="legend">
        <span><i class="dot andong"></i>안동 출발</span>
        <span><i class="dot seoul"></i>서울 출발</span>
        <span><i class="dot gimcheon"></i>김천구미 출발</span>
      </div>
    </div>

    <div class="toolbar">
      <button id="refresh">새로고침</button>
    </div>

    <div id="rows" class="ticket-list"></div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <span id="nextTrain">다음 출발: -</span>
    <span id="remainCount">오늘 남은 표: 0</span>
  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];

function parseCSV(text){
  const lines=[];let cur='';let row=[];let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur);cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r'&&n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length||row.length){row.push(cur);lines.push(row)}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d=new Date(s+'T00:00:00');
  return isNaN(d)?null:d;
}

function dateWithWeekday(s){
  const d=toDate(s);
  if(!d) return s||'-';
  const wd=['일','월','화','수','목','금','토'][d.getDay()];
  return `${s} (${wd})`;
}

function getDir(from,to){
  return (from.includes('김천구미') || from.includes('안동') || to.includes('서울')) ? '상행' : '하행';
}

function getDepClass(from){
  if(from.includes('안동')) return 'dep-andong';
  if(from.includes('서울')) return 'dep-seoul';
  if(from.includes('김천구미')) return 'dep-gimcheon';
  return '';
}

function parseDateTime(row){
  const d=(row['날짜']||'').trim();
  const t=(row['출발시간']||'').trim();
  if(!d || !t) return null;
  const dt = new Date(`${d}T${t}:00`);
  return isNaN(dt) ? null : dt;
}

function updateSummary(sortedRows){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  let next = null;
  let remain = 0;

  sortedRows.forEach(r=>{
    const dt = parseDateTime(r);
    if(!dt) return;

    const sameDay = dt.getFullYear()===today.getFullYear() && dt.getMonth()===today.getMonth() && dt.getDate()===today.getDate();
    if(sameDay && dt >= now) remain++;

    if(dt >= now && (!next || dt < next.dt)){
      next = {dt, row:r};
    }
  });

  const nextEl = document.getElementById('nextTrain');
  const remainEl = document.getElementById('remainCount');

  if(next){
    const m = Math.floor((next.dt - now) / 60000);
    const from = (next.row['출발역']||'-').trim();
    const to = (next.row['도착역']||'-').trim();
    const time = (next.row['출발시간']||'-').trim();
    nextEl.textContent = `다음 출발: ${from}→${to} ${time} (약 ${m}분 후)`;
  }else{
    nextEl.textContent = '다음 출발: 예정 없음';
  }

  remainEl.textContent = `오늘 남은 표: ${remain}`;
}

function render(rows){
  const tb=document.getElementById('rows');
  tb.innerHTML='';

  if(!rows.length){
    tb.innerHTML='<div class="empty">표시할 열차표가 없어.</div>';
    updateSummary([]);
    return;
  }

  rows.forEach((r,idx)=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const dir=getDir(from,to);
    const depClass=getDepClass(from);
    const memo=(r['메모']||'').trim();
    const memoPreview = memo.length>22 ? memo.slice(0,22)+'…' : memo;

    const card=document.createElement('article');
    card.className=`ticket ${depClass}`;
    card.innerHTML=`
      <div class="ticket-head">
        <div>${dateWithWeekday(r['날짜'])}</div>
        <div><span class="dir-badge ${dir==='상행'?'up':'down'}">${dir}</span></div>
      </div>
      <div class="ticket-body">
        <div class="route">
          <div class="station">${from||'-'}</div>
          <div class="arrow">→</div>
          <div class="station right">${to||'-'}</div>
        </div>

        <div class="times">
          <div class="time-box">
            <div class="time-label">출발</div>
            <div class="time-strong">${r['출발시간']||'-'}</div>
          </div>
          <div class="time-box">
            <div class="time-label">도착</div>
            <div class="time-strong">${r['도착시간']||'-'}</div>
          </div>
        </div>

        <div class="meta">
          <div class="meta-box">
            <div class="meta-label">좌석</div>
            <div class="meta-value">${r['좌석']||'-'}</div>
          </div>
          <div class="meta-box">
            <div class="meta-label">상태</div>
            <div class="meta-value">예정</div>
          </div>
        </div>

        ${memo ? `
          <div class="memo-wrap" id="memo-${idx}">
            <button class="memo-toggle" data-target="memo-${idx}">메모 · ${memoPreview}</button>
            <div class="memo-full">${memo}</div>
          </div>
        ` : ''}
      </div>
    `;
    tb.appendChild(card);
  });

  document.querySelectorAll('.memo-toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const target = document.getElementById(btn.dataset.target);
      if(target) target.classList.toggle('open');
    });
  });

  updateSummary(rows);
}

function applySort(){
  const out=all.slice().sort((a,b)=>{
    const ak=`${a['날짜']||''} ${a['출발시간']||''}`;
    const bk=`${b['날짜']||''} ${b['출발시간']||''}`;
    return ak.localeCompare(bk);
  });
  render(out);
}

async function load(){
  const res=await fetch(SHEET_CSV+'#'+Date.now());
  const txt=await res.text();
  const lines=parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header=lines[0]||[];
  const sourceRows=lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));
  all=sourceRows.filter(r => (r['날짜']||'').trim() || (r['출발역']||'').trim() || (r['도착역']||'').trim() || (r['좌석']||'').trim());
  applySort();
}

document.getElementById('refresh').addEventListener('click',load);
load();
setInterval(load,10*60*1000);
</script>
</body>
</html>
