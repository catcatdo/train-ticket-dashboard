<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#f8fafc;color:#0f172a}
    .wrap{max-width:980px;margin:0 auto;padding:20px}
    h1{margin:0 0 8px;font-size:28px}.sub{color:#64748b;margin-bottom:16px}
    .card{background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:12px}
    .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .k{font-size:12px;color:#9ca3af}.v{font-size:18px;font-weight:700;line-height:1.3}
    .tools{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:center}
    input,select{background:#ffffff;color:#0f172a;border:1px solid #cbd5e1;border-radius:10px;padding:10px;width:100%;min-width:0}
    button{background:#2563eb;border:none;color:white;border-radius:10px;padding:10px 12px;cursor:pointer;white-space:nowrap}
    .led-wrap{
      background:#0b1220;
      border:2px solid #334155;
      border-radius:12px;
      padding:10px 0;
      margin-bottom:12px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(148,163,184,.2);
    }
    .led-track{
      white-space:nowrap;
      display:inline-block;
      padding-left:0;
      color:#facc15;
      font-weight:800;
      font-size:16px;
      letter-spacing:.4px;
      animation:ledScroll 28s linear infinite;
      text-shadow:0 0 6px rgba(250,204,21,.5);
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      will-change: transform;
    }
    @keyframes ledScroll{
      0%{transform:translateX(0)}
      100%{transform:translateX(-50%)}
    }
    .ticket-list{display:grid;gap:12px}
    .ticket{
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      border:2px solid #cbd5e1;
      box-shadow:0 8px 20px rgba(15,23,42,.08);
    }
    .ticket.up{border-color:#86efac}
    .ticket.down{border-color:#93c5fd}
    .ticket.kg{border-color:#fcd34d}

    .ticket-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:72px;
      padding:14px 16px;
      background:linear-gradient(90deg,#0b63b6,#0a5aa5);
      color:#fff;
      font-weight:800;
      font-size:19px;
    }
    .ticket-head .head-right{
      font-size:16px;
      opacity:.95;
    }

    .ticket.dep-seoul .ticket-head{background:linear-gradient(90deg,#38bdf8,#0ea5e9)}
    .ticket.dep-andong .ticket-head{background:linear-gradient(90deg,#fb923c,#f97316)}
    .ticket.dep-gimcheon .ticket-head{background:linear-gradient(90deg,#facc15,#eab308); color:#1f2937}

    .ticket-body{padding:16px 16px 14px}
    .route{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 12px}
    .station{font-size:38px;font-weight:900;letter-spacing:.2px;line-height:1.1;color:#0f172a}
    .arrow{opacity:.65;font-size:24px;flex-shrink:0;color:#64748b}
    .times{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}
    .time-strong{display:block;font-size:46px;font-weight:900;color:#0f172a;line-height:1}

    .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid #dbe3ec;border-radius:12px;overflow:hidden;background:#f8fafc}
    .meta-item{border-right:1px solid #dbe3ec;padding:10px 8px;text-align:center}
    .meta-item:last-child{border-right:none}
    .meta-label{font-size:13px;color:#475569;font-weight:700;margin-bottom:4px}
    .meta-value{font-size:24px;color:#0f172a;font-weight:900;line-height:1.1}
    .memo{margin-top:10px;font-size:15px;color:#475569;line-height:1.35}
    a{color:#2563eb}

    @media (max-width: 760px){
      .wrap{padding:12px}
      h1{font-size:22px}
      .row{grid-template-columns:repeat(2,minmax(0,1fr))}
      .v{font-size:16px}
      .tools{grid-template-columns:1fr 1fr;position:sticky;top:0;z-index:5;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:10px}
      #q{grid-column:1 / -1}
      #refresh{grid-column:1 / -1}
      .ticket-head{min-height:64px;font-size:16px;padding:12px 12px}
      .ticket-head .head-right{font-size:14px}
      .ticket-body{padding:12px}
      .station{font-size:30px}
      .arrow{font-size:20px}
      .time-strong{font-size:36px}
      .meta-value{font-size:20px}
      .memo{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>열차표 대시보드</h1>
    <div class="sub">Google Sheet 자동 연동 · 모바일 대응</div>

    <div class="led-wrap" aria-label="운행 전광판">
      <div class="led-track" id="ledTrack">LOADING...</div>
    </div>

    <div class="card tools" style="grid-template-columns:1fr">
      <button id="refresh">새로고침</button>
    </div>

    <div id="rows" class="ticket-list"></div>



  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];
let ledMessage='';

function parseCSV(text){
  const lines=[];let cur='';let row=[];let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur); cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r'&&n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length||row.length){row.push(cur); lines.push(row)}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return isNaN(d)?null:d;
}

function dateWithWeekday(s){
  const d = toDate(s);
  if(!d) return s || '-';
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${s} (${wd})`;
}

function render(rows){
  const tb=document.getElementById('rows'); tb.innerHTML='';
  const led=document.getElementById('ledTrack');
  const base = ledMessage.trim() ? `🐱 ${ledMessage.trim()}   ◆   ` : '🐱 환영합니다 · 열차표 대시보드   ◆   ';
  led.textContent = `${base}${base}${base}${base}`;

  rows.forEach(r=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const isUp = from.includes('김천구미') || from.includes('안동') || to.includes('서울');
    const dirClass = isUp ? 'up' : 'down';
    const isKg = from.includes('김천구미') || to.includes('김천구미');

    const depClass = from.includes('서울')
      ? 'dep-seoul'
      : from.includes('안동')
        ? 'dep-andong'
        : from.includes('김천구미')
          ? 'dep-gimcheon'
          : '';

    const card=document.createElement('article');
    card.className=`ticket ${dirClass}${isKg ? ' kg' : ''} ${depClass}`;
    card.innerHTML = `
      <div class="ticket-head">
        <div>${dateWithWeekday(r['날짜'])}</div>
        <div class="head-right">${isUp ? '상행' : '하행'}</div>
      </div>
      <div class="ticket-body">
        <div class="route">
          <div class="station">${from||'-'}</div>
          <div class="arrow">→</div>
          <div class="station">${to||'-'}</div>
        </div>
        <div class="times">
          <div><span class="time-strong">${r['출발시간']||'-'}</span></div>
          <div><span class="time-strong">${r['도착시간']||'-'}</span></div>
        </div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">좌석</div>
            <div class="meta-value">${r['좌석']||'-'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">구분</div>
            <div class="meta-value">${isUp ? '상행' : '하행'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">상태</div>
            <div class="meta-value">예정</div>
          </div>
        </div>
        ${(r['메모']||'').trim() ? `<div class="memo">메모 · ${r['메모']}</div>` : ''}
      </div>
    `;
    tb.appendChild(card);
  });

}

function applyFilter(){
  const out=all
    .slice()
    .sort((a,b)=> (a['날짜']||'').localeCompare(b['날짜']||''));
  render(out);
}

async function load(){
  const res=await fetch(SHEET_CSV+'#'+Date.now());
  const txt=await res.text();
  const lines=parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header=lines[0]||[];
  const sourceRows=lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));
  ledMessage=((sourceRows.find(r => (r['LED문구']||'').trim()) || {})['LED문구'] || '').trim();
  all=sourceRows.filter(r => (r['날짜']||'').trim() || (r['출발역']||'').trim() || (r['도착역']||'').trim() || (r['좌석']||'').trim());
  applyFilter();
}

document.getElementById('refresh').addEventListener('click',load);
load();
setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
