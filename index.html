<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열차표 대시보드</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --text:#0f172a;
      --muted:#64748b;
      --card:#ffffff;
      --line:#e2e8f0;
      --primary:#2563eb;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:780px;margin:0 auto;padding:16px}

    .top{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 6px 20px rgba(15,23,42,.05);
    }
    h1{margin:0;font-size:22px;line-height:1.2}
    .sub{margin-top:4px;color:var(--muted);font-size:13px}

    .toolbar{
      position:sticky; top:0; z-index:5;
      background:rgba(243,246,251,.92);
      backdrop-filter:saturate(180%) blur(8px);
      padding:6px 0 10px;
      margin-bottom:6px;
    }

    button{
      width:100%;
      border:0;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:var(--primary);
      cursor:pointer;
    }

    .ticket-list{display:grid;gap:10px}

    .ticket{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }

    .ticket-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(90deg,#2563eb,#1d4ed8);
    }

    .ticket.dep-seoul .ticket-head{background:linear-gradient(90deg,#0ea5e9,#0284c7)}
    .ticket.dep-andong .ticket-head{background:linear-gradient(90deg,#fb923c,#f97316)}
    .ticket.dep-gimcheon .ticket-head{background:linear-gradient(90deg,#facc15,#eab308);color:#1f2937}

    .ticket-body{padding:12px}

    .route{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
    }
    .station{
      font-size:28px;
      font-weight:800;
      line-height:1.15;
      word-break:keep-all;
    }
    .station.right{text-align:right}
    .arrow{font-size:20px;color:#64748b}

    .times{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:10px;
    }
    .time-box{
      border:1px solid #dbe3ec;
      border-radius:12px;
      padding:8px 10px;
      background:#f8fafc;
    }
    .time-label{font-size:12px;color:var(--muted);margin-bottom:2px}
    .time-strong{font-size:28px;font-weight:900;line-height:1.1}

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      border:1px solid #dbe3ec;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
    }
    .meta-item{padding:9px 6px;text-align:center;border-right:1px solid #dbe3ec}
    .meta-item:last-child{border-right:none}
    .meta-label{font-size:12px;color:#64748b;font-weight:700;margin-bottom:3px}
    .meta-value{font-size:18px;font-weight:800;line-height:1.2}

    .memo{
      margin-top:10px;
      font-size:14px;
      color:#475569;
      background:#f8fafc;
      border:1px dashed #cbd5e1;
      border-radius:10px;
      padding:8px 10px;
      line-height:1.35;
    }

    .empty{
      border:1px dashed #cbd5e1;
      border-radius:14px;
      padding:18px 12px;
      text-align:center;
      color:#64748b;
      background:#fff;
    }

    @media (min-width: 761px){
      .wrap{padding:24px}
      h1{font-size:26px}
      .ticket-list{gap:12px}
      .station{font-size:34px}
      .time-strong{font-size:34px}
      button{width:auto;padding:10px 14px}
      .toolbar{display:flex;justify-content:flex-end;background:transparent;backdrop-filter:none;padding:0 0 10px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>열차표 대시보드</h1>
      <div class="sub">Google Sheet 자동 연동 · 모바일 최적화</div>
    </div>

    <div class="toolbar">
      <button id="refresh">새로고침</button>
    </div>

    <div id="rows" class="ticket-list"></div>
  </div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1WTfKa5KAAGv4Zt_uChB8eEir_W896TOXVimt51Mw4qA/export?format=csv&gid=0';
let all=[];

function parseCSV(text){
  const lines=[]; let cur=''; let row=[]; let q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){
      row.push(cur); cur='';
    }else if((c==='\n' || c==='\r') && !q){
      if(c==='\r' && n==='\n') i++;
      row.push(cur); lines.push(row); row=[]; cur='';
    }else cur+=c;
  }
  if(cur.length || row.length){row.push(cur); lines.push(row);}
  return lines;
}

function toDate(s){
  if(!s) return null;
  const d = new Date(s+'T00:00:00');
  return isNaN(d) ? null : d;
}

function dateWithWeekday(s){
  const d = toDate(s);
  if(!d) return s || '-';
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${s} (${wd})`;
}

function render(rows){
  const tb=document.getElementById('rows');
  tb.innerHTML='';

  if(!rows.length){
    tb.innerHTML = `<div class="empty">표시할 열차표가 없어.</div>`;
    return;
  }

  rows.forEach(r=>{
    const from=(r['출발역']||'').trim();
    const to=(r['도착역']||'').trim();
    const isUp = from.includes('김천구미') || from.includes('안동') || to.includes('서울');

    const depClass = from.includes('서울')
      ? 'dep-seoul'
      : from.includes('안동')
        ? 'dep-andong'
        : from.includes('김천구미')
          ? 'dep-gimcheon'
          : '';

    const card=document.createElement('article');
    card.className=`ticket ${depClass}`;
    card.innerHTML = `
      <div class="ticket-head">
        <div>${dateWithWeekday(r['날짜'])}</div>
        <div>${isUp ? '상행' : '하행'}</div>
      </div>
      <div class="ticket-body">
        <div class="route">
          <div class="station">${from||'-'}</div>
          <div class="arrow">→</div>
          <div class="station right">${to||'-'}</div>
        </div>

        <div class="times">
          <div class="time-box">
            <div class="time-label">출발</div>
            <div class="time-strong">${r['출발시간']||'-'}</div>
          </div>
          <div class="time-box">
            <div class="time-label">도착</div>
            <div class="time-strong">${r['도착시간']||'-'}</div>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">좌석</div>
            <div class="meta-value">${r['좌석']||'-'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">구분</div>
            <div class="meta-value">${isUp ? '상행' : '하행'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">상태</div>
            <div class="meta-value">예정</div>
          </div>
        </div>

        ${(r['메모']||'').trim() ? `<div class="memo">메모 · ${r['메모']}</div>` : ''}
      </div>
    `;
    tb.appendChild(card);
  });
}

function applyFilter(){
  const out = all
    .slice()
    .sort((a,b)=> {
      const ak = `${a['날짜']||''} ${a['출발시간']||''}`;
      const bk = `${b['날짜']||''} ${b['출발시간']||''}`;
      return ak.localeCompare(bk);
    });
  render(out);
}

async function load(){
  const res = await fetch(SHEET_CSV+'#'+Date.now());
  const txt = await res.text();
  const lines = parseCSV(txt).filter(r=>r.some(x=>x&&x.trim()));
  const header = lines[0]||[];
  const sourceRows = lines.slice(1).map(r=>Object.fromEntries(header.map((h,i)=>[h,r[i]||''])));
  all = sourceRows.filter(r => (r['날짜']||'').trim() || (r['출발역']||'').trim() || (r['도착역']||'').trim() || (r['좌석']||'').trim());
  applyFilter();
}

document.getElementById('refresh').addEventListener('click',load);
load();
setInterval(load, 10 * 60 * 1000);
</script>
</body>
</html>
